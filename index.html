<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando SISNOV...</title>
  
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbxvjQXg3ITkmDSJRKJeTu8tQGiBmM7kK8LMWiw9HtuQdTWqfP3AqnGNMqBPPYv8npLP/exec">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #f7f9fa;
      font-family: 'Montserrat', sans-serif;
    }
    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }
    .loader {
      border: 4px solid #e9ecf0;
      border-top: 4px solid #238EDE; /* Tu color cyan */
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .text {
      color: #0D3878; /* Tu color indigo */
      font-weight: 600;
      font-size: 14px;
    }
    .fallback {
      margin-top: 20px;
      font-size: 11px;
      color: #666;
    }
    .fallback a {
      color: #238EDE;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <img src="https://i.imgur.com/gpPPmhy.png" alt="Chapelco Seguridad" class="logo">
  
  <div class="loader"></div>
  
  <div class="text">Conectando con SISNOV...</div>

  <div class="fallback">
    Si no te redirige automáticamente, <a href="https://script.google.com/macros/s/AKfycbxvjQXg3ITkmDSJRKJeTu8tQGiBmM7kK8LMWiw9HtuQdTWqfP3AqnGNMqBPPYv8npLP/exec">haz clic aquí</a>.
  </div>

  <script>
    setTimeout(function() {
      window.location.replace("https://script.google.com/macros/s/AKfycbxvjQXg3ITkmDSJRKJeTu8tQGiBmM7kK8LMWiw9HtuQdTWqfP3AqnGNMqBPPYv8npLP/exec");
    }, 100);
  </script>

</body>
</html>
